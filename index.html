<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        /* Exact Apple Palette */
        :root {
            --apple-bg: #000000;
            --apple-num: #333333;
            --apple-top: #a5a5a5;
            --apple-orange: #ff9f0a;
            --apple-text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }

        body {
            background-color: #1c1c1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Fixed Dimensions: This stops the "squashing" forever */
        .calc-container {
            width: 350px;
            height: 700px;
            background-color: var(--apple-bg);
            border-radius: 45px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Keeps buttons at the bottom */
            border: 1px solid #222;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: auto; /* Pushes brand to top */
            padding-top: 10px;
        }

        .profile-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #333;
            margin-right: 12px;
        }

        .brand {
            color: #8e8e93;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .display {
            text-align: right;
            padding: 20px 10px;
            margin-bottom: 10px;
        }

        .result {
            color: var(--apple-text);
            font-size: 5.5rem;
            font-weight: 300;
            letter-spacing: -2px;
            overflow: hidden;
        }

        /* Scientific Row - Small and Clean */
        .sci-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .sci-btn {
            background: transparent;
            color: var(--apple-orange);
            border: 1px solid #222;
            padding: 8px;
            border-radius: 10px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        /* Main Pad: Fixed 75px circles */
        .pad {
            display: grid;
            grid-template-columns: repeat(4, 75px);
            grid-template-rows: repeat(5, 75px);
            gap: 12px;
            justify-content: center;
        }

        button {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: none;
            font-size: 2rem;
            font-weight: 400;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: filter 0.1s;
        }

        button:active { filter: brightness(1.4); }

        .btn-num { background-color: var(--apple-num); color: white; }
        .btn-top { background-color: var(--apple-top); color: black; font-size: 1.6rem; }
        .btn-op { background-color: var(--apple-orange); color: white; font-size: 2.2rem; }

        /* The Pill Shape for Zero */
        .zero {
            grid-column: span 2;
            width: 162px; /* (75 * 2) + 12 gap */
            border-radius: 40px;
            justify-content: flex-start;
            padding-left: 28px;
        }

        .history-bar {
            height: 30px;
            text-align: center;
            color: #444;
            font-size: 0.7rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="calc-container">
    <div class="header">
        <img src="cprofile.png" alt="Profile" class="profile-img">
        <span class="brand">Cremildo Isaias</span>
    </div>
