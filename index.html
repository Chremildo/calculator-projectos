<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        :root {
            --bg-color: #000000;
            --btn-number: #333333;
            --btn-top: #a5a5a5;
            --btn-accent: #ff9f0a;
            --text-white: #ffffff;
            --text-black: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Helvetica, sans-serif;
        }

        body {
            background-color: #1c1c1e;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .iphone-frame {
            width: 375px;
            background-color: var(--bg-color);
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Profile & Branding Header */
        .header {
            display: flex;
            align-items: center;
            padding: 10px 10px 0;
        }

        .profile-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #333;
            margin-right: 12px;
        }

        .brand-text {
            color: #8e8e93;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Display */
        .display {
            padding: 40px 15px 10px;
            text-align: right;
            color: var(--text-white);
        }

        .result {
            font-size: 5.5rem;
            font-weight: 300;
            line-height: 1;
            letter-spacing: -2px;
            overflow-x: auto;
            white-space: nowrap;
        }

        /* Scientific Row (Subtle & Integrated) */
        .sci-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 12px;
            padding: 0 10px;
        }

        .sci-btn {
            background: #1c1c1e;
            color: var(--text-white);
            border: none;
            border-radius: 15px;
            padding: 8px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        /* Main Keypad */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 10px;
        }

        button.key {
            aspect-ratio: 1;
            border: none;
            border-radius: 50%;
            font-size: 2rem;
            font-weight: 400;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.15s;
        }

        button.key:active {
            opacity: 0.7;
        }

        .num { background-color: var(--btn-number); color: var(--text-white); }
        .top { background-color: var(--btn-top); color: var(--text-black); font-size: 1.6rem; }
        .op  { background-color: var(--btn-accent); color: var(--text-white); font-size: 2.2rem; }

        /* The Apple Zero: Wide pill shape */
        .zero {
            grid-column: span 2;
            aspect-ratio: auto;
            border-radius: 50px;
            justify-content: flex-start;
            padding-left: 32px;
        }

        /* Hidden History Log (Bottom) */
        .history {
            margin-top: 15px;
            height: 40px;
            overflow-y: auto;
            font-size: 0.75rem;
            color: #48484a;
            text-align: center;
            padding: 0 10px;
        }
    </style>
</head>
<body>

<div class="iphone-frame">
    <div class="header">
        <img src="cprofile.png" alt="Kevin" class="profile-img">
        <span class="brand-text">Cremildo Isaias</span>
    </div>

    <div class="display">
        <div class="result" id="display">0</div>
    </div>

    <div class="sci-row">
        <button class="sci-btn" onclick="sci('Math.sin')">sin</
