<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Pro | Cremildo Isaias</title>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-num: #333333;
            --ios-top: #a5a5a5;
            --ios-orange: #ff9f0a;
            --ios-text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }

        body {
            background-color: #1c1c1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Fixed Dimensions to prevent squashing */
        .calculator {
            width: 375px;
            height: 812px;
            background-color: var(--ios-bg);
            border-radius: 40px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border: 1px solid #333;
            position: relative;
        }

        /* Professional Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 5px;
        }

        .profile-pic {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--ios-num);
        }

        .brand-name {
            color: #8e8e93;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Display Area */
        .display-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            text-align: right;
            padding: 20px 10px;
        }

        .history-log {
            color: #636366;
            font-size: 1.2rem;
            min-height: 30px;
            margin-bottom: 5px;
        }

        .main-display {
            color: var(--ios-text);
            font-size: 5.5rem;
            font-weight: 300;
            letter-spacing: -2px;
            line-height: 1;
        }

        /* Button Grid: 80px circles */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(5, 80px);
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
        }

        button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            font-size: 2.2rem;
            font-weight: 400;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: filter 0.1s;
        }

        button:active { filter: brightness(1.5); }

        .btn-num { background-color: var(--ios-num); color: white; }
        .btn-top { background-color: var(--ios-top); color: black; font-size: 1.8rem; }
        .btn-op { background-color: var(--ios-orange); color: white; font-size: 2.5rem; }

        /* The Apple Zero Pill */
        .zero {
            grid-column: span 2;
            width: 172px; /* 80 + 80 + 12 gap */
            border-radius: 50px;
            justify-content: flex-start;
            padding-left: 30px;
        }

        /* Mini Scientific Bar */
        .sci-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            padding: 0 10px;
        }

        .sci-btn {
            background: transparent;
            color: #8e8e93;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="calculator">
    <div class="header">
        <img src="cprofile.png" alt="Profile" class="profile-pic">
        <span class="brand-name">Cremildo Isaias</span>
    </div>

    <div class="display-area">
        <div class="history-log" id="history"></div>
        <div class="main-display" id="res">0</div>
    </div>

    <div class="sci-bar">
        <button class="sci-btn" onclick="sci('sin')">sin</button>
        <button class="sci-btn" onclick="sci('cos')">cos</button>
        <button class="sci-btn" onclick="sci('sqrt')">√</button>
        <button class="sci-btn" onclick="sci('sq')">x²</button>
    </div>

    <div class="grid">
        <button class="btn-top" onclick="cls()">AC</button>
        <button class="btn-top" onclick="del()">⌫</button>
        <button class="btn-top" onclick="op('%')">%</button>
        <button class="btn-op" onclick="op('/')">÷</button>

        <button class="btn-num" onclick="num('7')">7</button>
        <button class="btn-num" onclick="num('8')">8</button>
        <button class="btn-num" onclick="num('9')">9</button>
        <button class="btn-op" onclick="op('*')">×</button>

        <button class="btn-num" onclick="num('4')">4</button>
        <button class="btn-num" onclick="num('5')">5</button>
        <button class="btn-num" onclick="num('6')">6</button>
        <button class="btn-op" onclick="op('-')">−</button>

        <button class="btn-num" onclick="num('1')">1</button>
        <button class="btn-num" onclick="num('2')">2</button>
        <button class="btn-num" onclick="num('3')">3</button>
        <button class="btn-op" onclick="op('+')">+</button>

        <button class="btn-num zero" onclick="num('0')">0</button>
        <button class="btn-num" onclick="num('.')">,</button>
        <button class="btn-op" onclick="calc()">=</button>
    </div>
</div>

<script>
    let cur = '0';
    let buffer = '';
    const display = document.getElementById('res');
    const history = document.getElementById('history');

    function num(n) {
        cur = (cur === '0') ? n : cur + n;
        display.textContent = cur;
    }

    function op(s) {
        buffer += cur + s;
        history.textContent = buffer;
        cur = '0';
    }

    function calc() {
        try {
            let expr = buffer + cur;
            let result = eval(expr.replace('×','*').replace('÷','/').replace('−','-'));
            history.textContent = expr + ' =';
            cur = String(Number(result.toFixed(8)));
            display.textContent = cur;
            buffer = '';
        } catch { display.textContent = "Error"; }
    }

    function sci(t) {
        let n = parseFloat(cur);
        if(t === 'sin') cur = Math.sin(n);
        if(t === 'cos') cur = Math.cos(n);
        if(t === 'sqrt') cur = Math.sqrt(n);
        if(t === 'sq') cur = Math.pow(n, 2);
        cur = String(Number(parseFloat(cur).toFixed(6)));
        display.textContent = cur;
    }

    function cls() { cur = '0'; buffer = ''; display.textContent = '0'; history.textContent = ''; }
    function del() { cur = cur.length > 1 ? cur.slice(0, -1) : '0'; display.textContent = cur; }
</script>

</body>
</html>
