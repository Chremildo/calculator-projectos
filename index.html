<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Pro</title>
    <style>
        :root {
            --bg: #000000;
            --num: #333333;
            --top: #a5a5a5;
            --orange: #ff9f0a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }

        body {
            background-color: #1c1c1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Stops the body from scrolling */
        }

        /* HARD LOCKED DIMENSIONS - Cannot squash */
        .calc-wrapper {
            width: 360px;
            height: 780px; 
            background: var(--bg);
            border-radius: 40px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border: 1px solid #333;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 50px;
        }

        .profile {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--num);
        }

        .brand { color: #8e8e93; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* HISTORY SECTION */
        .history-box {
            flex: 1; /* Takes up remaining space */
            overflow-y: auto;
            text-align: right;
            padding: 10px;
            color: #636366;
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .display {
            text-align: right;
            padding: 10px;
            color: white;
            font-size: 5rem;
            font-weight: 300;
            margin-bottom: 10px;
        }

        /* SCIENTIFIC BAR - Compact */
        .sci-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .sci-btn {
            background: #1c1c1e;
            color: var(--orange);
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* GRID FIX: Constant 75px circles */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 75px);
            grid-template-rows: repeat(5, 75px);
            gap: 12px;
            justify-content: center;
        }

        button.key {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.1s;
        }

        button.key:active { filter: brightness(1.5); }
        .btn-n { background: var(--num); color: white; }
        .btn-t { background: var(--top); color: black; font-size: 1.5rem; }
        .btn-o { background: var(--orange); color: white; font-size: 2.2rem; }

        .zero {
            grid-column: span 2;
            width: 162px; /* 75+75+12 gap */
            border-radius: 50px;
            justify-content: flex-start;
            padding-left: 30px;
        }
    </style>
</head>
<body>

<div class="calc-wrapper">
    <div class="header">
        <img src="cprofile.png" alt="Kevin" class="profile" onerror="this.src='https://via.placeholder.com/45'">
        <span class="brand">Cremildo Isaias</span>
    </div>

    <div class="history-box" id="hist"></div>
    <div class="display" id="res">0</div>

    <div class="sci-bar">
        <button class="sci-btn" onclick="sci('sin')">sin</button>
        <button class="sci-btn" onclick="sci('cos')">cos</button>
        <button class="sci-btn" onclick="sci('sqrt')">√</button>
        <button class="sci-btn" onclick="sci('sq')">x²</button>
    </div>

    <div class="grid">
        <button class="key btn-t" onclick="cls()">AC</button>
        <button class="key btn-t" onclick="del()">⌫</button>
        <button class="key btn-t" onclick="op('%')">%</button>
        <button class="key btn-o" onclick="op('/')">÷</button>

        <button class="key btn-n" onclick="num('7')">7</button>
        <button class="key btn-n" onclick="num('8')">8</button>
        <button class="key btn-n" onclick="num('9')">9</button>
        <button class="key btn-o" onclick="op('*')">×</button>

        <button class="key btn-n" onclick="num('4')">4</button>
        <button class="key btn-n" onclick="num('5')">5</button>
        <button class="key btn-n" onclick="num('6')">6</button>
        <button class="key btn-o" onclick="op('-')">−</button>

        <button class="key btn-n" onclick="num('1')">1</button>
        <button class="key btn-n" onclick="num('2')">2</button>
        <button class="key btn-n" onclick="num('3')">3</button>
        <button class="key btn-o" onclick="op('+')">+</button>

        <button class="key btn-n zero" onclick="num('0')">0</button>
        <button class="key btn-n" onclick="num('.')">,</button>
        <button class="key btn-o" onclick="calc()">=</button>
    </div>
</div>

<script>
    let cur = '0';
    let buf = '';
    const resDiv = document.getElementById('res');
    const histDiv = document.getElementById('hist');

    function num(n) {
        cur = (cur === '0') ? n : cur + n;
        resDiv.textContent = cur;
    }

    function op(s) {
        buf += cur + ' ' + s + ' ';
        histDiv.textContent = buf;
        cur = '0';
    }

    function calc() {
        try {
            let expr = buf + cur;
            let result = eval(expr.replace('×','*').replace('÷','/').replace('−','-'));
            histDiv.innerHTML += `<div>${expr} =</div>`;
            cur = String(Number(result.toFixed(8)));
            resDiv.textContent = cur;
            buf = '';
        } catch { resDiv.textContent = "Error"; }
    }

    function sci(t) {
        let n = parseFloat(cur);
        if(t === 'sin') cur = Math.sin(n);
        if(t === 'cos') cur = Math.cos(n);
        if(t === 'sqrt') cur = Math.sqrt(n);
        if(t === 'sq') cur = Math.pow(n, 2);
        cur = String(Number(parseFloat(cur).toFixed(6)));
        resDiv.textContent = cur;
    }

    function cls() { cur = '0'; buf = ''; resDiv.textContent = '0'; histDiv.textContent = ''; }
    function del() { cur = cur.length > 1 ? cur.slice(0, -1) : '0'; resDiv.textContent = cur; }
</script>

</body>
</html>
