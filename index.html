<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora iPhone Pro</title>
    <style>
        :root {
            --ios-bg: #FFFFFF;
            --ios-num: #F2F2F7;
            --ios-top: #D1D1D6;
            --ios-orange: #FF9F0A;
            --ios-text: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }

        body {
            background-color: #E5E5EA;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Fixed iPhone Frame */
        .iphone-frame {
            width: 375px;
            height: 812px;
            background-color: var(--ios-bg);
            border-radius: 50px;
            padding: 20px 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            border: 1px solid #D1D1D6;
            position: relative;
        }

        /* Top Header with the 3 Dots */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            color: var(--ios-orange);
            font-size: 1.4rem;
        }

        .dots { cursor: pointer; letter-spacing: 2px; font-weight: bold; }

        /* History Tape */
        .history-tape {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            text-align: right;
            padding: 10px;
            color: #8E8E93;
            font-size: 1.4rem;
            min-height: 60px;
        }

        .display {
            text-align: right;
            padding: 0 10px 25px 10px;
            color: var(--ios-text);
            font-size: 6rem;
            font-weight: 300;
            letter-spacing: -3px;
            line-height: 1;
        }

        /* Keypad Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(5, 80px);
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            font-size: 2.2rem;
            font-weight: 400;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.1s;
        }

        button:active { opacity: 0.6; }

        .btn-num { background-color: var(--ios-num); color: black; }
        .btn-top { background-color: var(--ios-top); color: black; font-size: 1.8rem; }
        .btn-op  { background-color: var(--ios-orange); color: white; font-size: 2.6rem; }

        .zero {
            grid-column: span 2;
            width: 172px;
            border-radius: 50px;
            justify-content: flex-start;
            padding-left: 32px;
        }

        /* Bottom Footer with Toggle Icon */
        .footer-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5px;
            color: var(--ios-orange);
            font-size: 1.5rem;
        }

        .calc-icon { font-size: 1.8rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="iphone-frame">
    <div class="top-nav">
        <div style="width: 24px;"></div> <div class="dots">...</div>
    </div>

    <div class="history-tape" id="hist"></div>
    <div class="display" id="res">0</div>

    <div class="grid">
        <button class="btn-top" onclick="cls()">AC</button>
        <button class="btn-top" onclick="toggleSign()">+/-</button>
        <button class="btn-top" onclick="pct()">%</button>
        <button class="btn-op" onclick="setOp('/')">÷</button>

        <button class="btn-num" onclick="addNum('7')">7</button>
        <button class="btn-num" onclick="addNum('8')">8</button>
        <button class="btn-num" onclick="addNum('9')">9</button>
        <button class="btn-op" onclick="setOp('*')">×</button>

        <button class="btn-num" onclick="addNum('4')">4</button>
        <button class="btn-num" onclick="addNum('5')">5</button>
        <button class="btn-num" onclick="addNum('6')">6</button>
        <button class="btn-op" onclick="setOp('-')">−</button>

        <button class="btn-num" onclick="addNum('1')">1</button>
        <button class="btn-num" onclick="addNum('2')">2</button>
        <button class="btn-num" onclick="addNum('3')">3</button>
        <button class="btn-op" onclick="setOp('+')">+</button>

        <button class="btn-num zero" onclick="addNum('0')">0</button>
        <button class="btn-num" onclick="addNum('.')">,</button>
        <button class="btn-op" onclick="calc()">=</button>
    </div>

    <div class="footer-nav">
        <span class="calc-icon">⌨️</span>
        <span style="font-size: 0.9rem; font-weight: 600;">Cremildo Isaias</span>
        <span class="calc-icon">📋</span>
    </div>
</div>

<script>
    let current = '0';
    let buffer = '';
    const displayElement = document.getElementById('res');
    const historyElement = document.getElementById('hist');

    function addNum(n) {
        if (current === '0' && n !== '.') current = n;
        else current += n;
        displayElement.textContent = current;
    }

    function setOp(op) {
        buffer += current + ' ' + op + ' ';
        historyElement.textContent = buffer;
        current = '0';
    }

    function calc() {
        try {
            let expression = buffer + current;
            let result = eval(expression.replace('×', '*').replace('÷', '/').replace('−', '-'));
            historyElement.innerHTML = `<div>${expression} =</div>`;
            current = String(Number(result.toFixed(8)));
            displayElement.textContent = current;
            buffer = '';
        } catch { displayElement.textContent = "Error"; }
    }

    function toggleSign() {
        current = String(parseFloat(current) * -1);
        displayElement.textContent = current;
    }

    function pct() {
        current = String(parseFloat(current) / 100);
        displayElement.textContent = current;
    }

    function cls() { 
        current = '0'; 
        buffer = ''; 
        displayElement.textContent = '0'; 
        historyElement.textContent = ''; 
    }
</script>

</body>
</html>
