  <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Glass Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-dark: #1d1d1f;
            --text-muted: #86868b;
            --accent-orange: #ff9f0a;
            --btn-light: rgba(255, 255, 255, 0.8);
            --btn-dark: rgba(0, 0, 0, 0.05);
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .wrapper { width: 100%; max-width: 420px; }

        .calc {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 24px;
            box-shadow: var(--shadow);
        }

        .display {
            padding: 20px 10px;
            text-align: right;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            min-height: 140px;
        }

        .expr { font-size: 1rem; color: var(--text-muted); margin-bottom: 5px; min-height: 1.2em; word-break: break-all; }
        .result { font-size: 3rem; font-weight: 300; color: var(--text-dark); letter-spacing: -0.03em; overflow: hidden; }

        /* 5-Column Grid for Scientific Layout */
        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        button {
            aspect-ratio: 1;
            border-radius: 50%;
            border: none;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--btn-light);
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover { background: #fff; transform: scale(1.08); }
        button:active { transform: scale(0.95); filter: brightness(0.9); }

        /* Special Button Styles */
        button.op { background: var(--accent-orange); color: white; font-size: 1.4rem; }
        button.sci { background: var(--btn-dark); font-size: 0.9rem; color: #555; }
        button.ac { color: #d32f2f; font-weight: 600; }
        
        .zero { grid-column: span 2; aspect-ratio: auto; border-radius: 30px; justify-content: flex-start; padding-left: 25px; }

        .log-section {
            margin-top: 20px;
            padding-top: 15px;
            max-height: 80px;
            overflow-y: auto;
            border-top: 1px solid rgba(0,0,0,0.05);
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="wrapper">
  <div class="calc">
    <div class="display">
      <div class="expr" id="expr"></div>
      <div class="result" id="result">0</div>
    </div>
 
    <div class="buttons">
      <button class="sci" onclick="inputSci('Math.sin(')">sin</button>
      <button class="sci" onclick="inputSci('Math.cos(')">cos</button>
      <button class="sci" onclick="inputSci('Math.tan(')">tan</button>
      <button class="sci" onclick="inputSci('Math.log10(')">log</button>
      <button class="sci" onclick="inputNum('Math.PI')">π</button>

      <button class="sci" onclick="inputSci('Math.sqrt(')">√</button>
      <button class="sci" onclick="inputSci('**2')">x²</button>
      <button class="sci" onclick="inputNum('(')">(</button>
      <button class="sci" onclick="inputNum(')')">)</button>
      <button class="op" onclick="inputOp('/')">÷</button>
 
      <button onclick="inputNum('7')">7</button>
      <button onclick="inputNum('8')">8</button>
      <button onclick="inputNum('9')">9</button>
      <button class="sci ac" onclick="clearAll()">AC</button>
      <button class="op" onclick="inputOp('*')">×</button>
