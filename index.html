<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cremildo Isaias | Pro Calculator</title>
    <style>
        :root {
            --bg: #f2f2f7;
            --calc-bg: #ffffff;
            --accent: #ff9f0a;
            --text: #1c1c1e;
            --btn-gray: #e5e5ea;
            --btn-dark-gray: #d1d1d6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }

        body {
            background: linear-gradient(135deg, #e5e5ea 0%, #d1d1d6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .calculator {
            width: 100%;
            max-width: 360px; /* Locks width to prevent stretching */
            background: var(--calc-bg);
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        /* Branding Section */
        .brand-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .logo {
            height: 40px;
            width: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #eee;
        }

        .brand-name { font-size: 0.7rem; font-weight: 700; color: #8e8e93; text-transform: uppercase; letter-spacing: 1.5px; }

        .display { text-align: right; padding: 30px 10px; color: var(--text); }
        .result { font-size: 4.5rem; font-weight: 300; white-space: nowrap; overflow: hidden; }

        .sci-toggle {
            background: var(--btn-gray);
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            color: #666;
        }

        /* The Grid Fix: '1fr' ensures 4 equal columns */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px;
        }

        button {
            aspect-ratio: 1; /* Forces buttons to stay circular */
            border-radius: 50%;
            border: none;
            font-size: 1.5rem;
            font-weight: 500;
            cursor: pointer;
            background: var(--btn-gray);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.6; }
        button.num { background: #fefefe; }
        button.op { background: var(--accent); color: white; }
        button.top { background: var(--btn-dark-gray); }

        /* Fixed Zero: Spans 2 columns but maintains proper layout */
        .zero {
            grid-column: span 2;
            aspect-ratio: auto; 
            border-radius: 50px;
            justify-content: flex-start;
            padding-left: 25px;
        }

        .history-section {
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 15px;
            max-height: 80px;
            overflow-y: auto;
            font-size: 0.8rem;
            color: #8e8e93;
        }
    </style>
</head>
<body>

<div class="calculator">
    <div class="brand-header">
        <img src="cprofile.png" alt="Cremildo" class="logo">
        <span class="brand-name">Dev Precision</span>
    </div>

    <div class="display">
        <div class="result" id="res">0</div>
    </div>

    <button class="sci-toggle">Scientific Mode</button>

    <div class="grid">
        <button class="top" onclick="reset()">AC</button>
        <button class="top" onclick="del()">⌫</button>
        <button class="top" onclick="setOp('%')">%</button>
        <button class="op" onclick="setOp('/')">÷</button>

        <button class="num" onclick="addNum('7')">7</button>
        <button class="num" onclick="addNum('8')">8</button>
        <button class="num" onclick="addNum('9')">9</button>
        <button class="op" onclick="setOp('*')">×</button>

        <button class="num" onclick="addNum('4')">4</button>
        <button class="num" onclick="addNum('5')">5</button>
        <button class="num" onclick="addNum('6')">6</button>
        <button class="op" onclick="setOp('-')">−</button>

        <button class="num" onclick="addNum('1')">1</button>
        <button class="num" onclick="addNum('2')">2</button>
        <button class="num" onclick="addNum('3')">3</button>
        <button class="op" onclick="setOp('+')">+</button>

        <button class="num zero" onclick="addNum('0')">0</button>
        <button class="num" onclick="addNum('.')">.</button>
        <button class="op" onclick="calc()">=</button>
    </div>

    <div class="history-section" id="hist">Histórico...</div>
</div>

<script>
    let current = '0';
    let buffer = '';
    const resEl = document.getElementById('res');

    function addNum(n) {
        if (current === '0') current = n;
        else current += n;
        resEl.textContent = current;
    }

    function reset() { current = '0'; buffer = ''; resEl.textContent = '0'; }
    
    function setOp(o) {
        buffer += current + o;
        current = '0';
    }

    function calc() {
        try {
            let total = eval(buffer + current);
            resEl.textContent = total;
            current = String(total);
            buffer = '';
        } catch { resEl.textContent = "Erro"; }
    }
</script>
</body>
</html>
