<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cremildo Isaias | Pro Scientific</title>
    <style>
        :root {
            --bg: #f2f2f7;
            --calc-bg: rgba(255, 255, 255, 0.85);
            --accent: #ff9f0a;
            --text: #1c1c1e;
            --gray-btn: #e5e5ea;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }

        body {
            background: linear-gradient(135deg, #e5e5ea 0%, #d1d1d6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .calculator {
            width: 100%;
            max-width: 380px;
            background: var(--calc-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
            display: flex;
            flex-direction: column;
        }

        /* Branding Section */
        .brand-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .logo {
            height: 45px;
            width: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .brand-name { font-size: 0.75rem; font-weight: 700; color: #8e8e93; text-transform: uppercase; letter-spacing: 1.5px; }

        /* Display Area */
        .display { text-align: right; padding: 20px 5px; color: var(--text); }
        .expr-preview { font-size: 1rem; color: #8e8e93; min-height: 1.2em; margin-bottom: 5px; }
        .result { font-size: 4rem; font-weight: 300; overflow-x: auto; white-space: nowrap; }

        /* Scientific Toggle */
        .sci-toggle {
            background: var(--gray-btn);
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            color: #3a3a3c;
            transition: 0.3s;
        }
        .sci-toggle.active { background: var(--accent); color: white; }

        .sci-drawer {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 12px;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Keypad Grid */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        
        button.key {
            aspect-ratio: 1;
            border-radius: 50%;
            border: none;
            font-size: 1.5rem;
            font-weight: 500;
            cursor: pointer;
            background: white;
            transition: transform 0.1s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button.key:active { transform: scale(0.9); filter: brightness(0.9); }
        button.op { background: var(--accent); color: white; }
        button.top-row { background: #d1d1d6; font-size: 1.2rem; }
        button.sci-btn { background: #e5e5ea; font-size: 0.95rem; border-radius: 12px; aspect-ratio: 1.5; }
        .zero { grid-column: span 2; aspect-ratio: auto; border-radius: 50px; justify-content: flex-start; padding-left: 25px; }

        /* History Section */
        .history-box {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(0,0,0,0.08);
            max-height: 100px;
            overflow-y: auto;
        }
        .history-title { font-size: 0.7rem; font-weight: 700; color: #aeaeb2; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .log-entry { font-size: 0.9rem; color: #636366; display: flex; justify-content: space-between; margin-bottom: 6px; padding: 0 5px; }

        /* Scrollbar Styling */
        .history-box::-webkit-scrollbar { width: 4px; }
        .history-box::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 10px; }
    </style>
</head>
<body>

<div class="calculator">
    <div class="brand-header">
        <img src="cprofile.png" alt="Cremildo Isaias" class="logo" onerror="this.src='https://via.placeholder.com/45'">
        <span class="brand-name">Cremildo Isaias</span>
    </div>

    <div class="display">
        <div class="expr-preview" id="preview"></div>
        <div class="result" id="res">0</div>
    </div>

    <button class="sci-toggle" id="tgl" onclick="toggleSci()">Scientific Mode</button>

    <div class="sci-drawer" id="drawer">
        <button class="key sci-btn" onclick="inputSci('Math.sin(')">sin</button>
        <button class="key sci-btn" onclick="inputSci('Math.cos(')">cos</button>
        <button class="key sci-btn" onclick="inputSci('Math.sqrt(')">√</button>
        <button class="key sci-btn" onclick="inputSci('**2')">x²</button>
    </div>

    <div class="grid">
        <button class="key top-row" onclick="reset()">AC</button>
        <button class="key top-row" onclick="del()">⌫</button>
        <button class="key top-row" onclick="op('%')">%</button>
        <button class="key op" onclick="op('/')">÷</button>

        <button class="key" onclick="num('7')">7</button>
        <button class="key" onclick="num('8')">8</button>
        <button class="key" onclick="num('9')">9</button>
        <button class="key op" onclick="op('*')">×</button>

        <button class="key" onclick="num('4')">4</button>
        <button class="key" onclick="num('5')">5</button>
        <button class="key" onclick="num('6')">6</button>
        <button class="key op" onclick="op('-')">−</button>

        <button class="key" onclick="num('1')">1</button>
        <button class="key" onclick="num('2')">2</button>
        <button class="key" onclick="num('3')">3</button>
        <button class="key op" onclick="op('+')">+</button>

        <button class="key zero" onclick="num('0')">0</button>
        <button class="key" onclick="num('.')">.</button>
        <button class="key op" onclick="calculate()">=</button>
    </div>

    <div class="history-box">
        <div class="history-title">Calculations History</div>
        <div id="history-log"></div>
    </div>
</div>

<script>
    let currentDisplay = '0';
    let operationBuffer = '';
    let isResultDisplayed = false;

    function toggleSci() {
        const drawer = document.getElementById('drawer');
        const toggleBtn = document.getElementById('tgl');
        const isCurrentlyOpen = drawer.style.display === 'grid';
        drawer.style.display = isCurrentlyOpen ? 'none' : 'grid';
        toggleBtn.classList.toggle('active');
        toggleBtn.textContent = isCurrentlyOpen ? 'Scientific Mode' : 'Close Scientific Mode';
    }

    function num(val) {
        if (currentDisplay === '0' || isResultDisplayed) {
            currentDisplay = val;
            isResultDisplayed = false;
        } else {
            currentDisplay += val;
        }
        updateUI();
    }

    function op(symbol) {
        operationBuffer = currentDisplay + ' ' + symbol + ' ';
        currentDisplay = '0';
        updateUI();
    }

    function inputSci(func) {
        let visualExpr = '';
        if(func === '**2') visualExpr = `(${currentDisplay})²`; 
        else visualExpr = func.replace('Math.', '') + currentDisplay + ')';
        
        currentDisplay = visualExpr;
        calculate();
    }

    function calculate() {
        try {
            let expressionToEval = (operationBuffer + currentDisplay)
                .replace(/×/g, '*')
                .replace(/÷/g, '/')
                .replace(/−/g, '-')
                .replace(/²/g, '**2')
                .replace(/sin/g, 'Math.sin')
                .replace(/cos/g, 'Math.cos')
                .replace(/√/g, 'Math.sqrt');

            let result = eval(expressionToEval);
            let formattedResult = Number(result.toFixed(6));
            
            // Add to History UI
            const historyLog = document.getElementById('history-log');
            const newEntry = document.createElement('div');
            newEntry.className = 'log-entry';
            newEntry.innerHTML = `<span>${operationBuffer + currentDisplay}</span><strong>${formattedResult}</strong>`;
            historyLog.prepend(newEntry);

            currentDisplay = String(formattedResult);
            operationBuffer = '';
            isResultDisplayed = true;
            updateUI();
        } catch(e) {
            document.getElementById('res').textContent = "Error";
            currentDisplay = '0';
        }
    }

    function updateUI() {
        document.getElementById('res').textContent = currentDisplay;
        document.getElementById('preview').textContent = operationBuffer;
    }

    function reset() {
        currentDisplay = '0';
        operationBuffer = '';
        isResultDisplayed = false;
        updateUI();
    }

    function del() {
        if (currentDisplay.length > 1) {
            currentDisplay = currentDisplay.slice(0, -1);
        } else {
            currentDisplay = '0';
        }
        updateUI();
    }
</script>

</body>
</html>
