      <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora iPhone</title>
    <style>
        :root {
            --ios-white: #FFFFFF;
            --ios-bg: #F2F2F7; /* Genuine iOS Light Mode background */
            --btn-num: #FFFFFF;
            --btn-top: #D1D1D6;
            --btn-orange: #FF9F0A;
            --ios-text: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }

        body {
            background-color: #E5E5EA;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Fixed iPhone Pro Dimensions */
        .iphone {
            width: 375px;
            height: 812px;
            background-color: var(--ios-bg);
            border-radius: 50px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            position: relative;
            border: 8px solid #333; /* iPhone frame */
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .profile-pic {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #D1D1D6;
        }

        .name { color: #8E8E93; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        /* THE HISTORY LOG - Real Apple functionality */
        .history-tray {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            text-align: right;
            padding: 10px;
            overflow-y: auto;
            color: #8E8E93;
            font-size: 1.2rem;
            min-height: 100px;
        }

        .current-display {
            text-align: right;
            padding: 10px;
            color: var(--ios-text);
            font-size: 5.5rem;
            font-weight: 300;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 30px;
        }

        /* Scientific Row */
        .sci-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }

        .sci-btn {
            background: #E5E5EA;
            color: var(--btn-orange);
            border: none;
            padding: 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* KEYPAD: Fixed 78px circles */
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 78px);
            grid-template-rows: repeat(5, 78px);
            gap: 12px;
            justify-content: center;
        }

        button.key {
            width: 78px;
            height: 78px;
            border-radius: 50%;
            border: none;
            font-size: 2.1rem;
            font-weight: 400;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        button.key:active { background-color: #C7C7CC; }

        .num { background-color: var(--btn-num); color: black; }
        .top { background-color: var(--btn-top); color: black; font-size: 1.7rem; }
        .op  { background-color: var(--btn-orange); color: white; font-size: 2.4rem; }

        /* Apple 0 Button Alignment */
        .zero {
            grid-column: span 2;
            width: 168px; /* (78*2) + 12 gap */
            border-radius: 50px;
            justify-content: flex-start;
            padding-left: 32px;
        }
    </style>
</head>
<body>

<div class="iphone">
    <div class="header">
        <img src="cprofile.png" alt="Kevin" class="profile-pic">
        <span class="name">Cremildo Isaias</span>
    </div>

    <div class="history-tray" id="history"></div>
    <div class="current-display" id="display">0</div>

    <div class="sci-row">
        <button class="sci-btn" onclick="sci('Math.sin')">sin</button>
        <button class="sci-btn" onclick="sci('Math.cos')">cos</button>
        <button class="sci-btn" onclick="sci('Math.sqrt')">√</button>
        <button class="sci-btn" onclick="sci('pow')">x²</button>
    </div>

    <div class="keypad">
        <button class="key top" onclick="reset()">AC</button>
        <button class="key top" onclick="del()">⌫</button>
        <button class="key top" onclick="addOp('%')">%</button>
        <button class="key op" onclick="addOp('/')">÷</button>

        <button class="key num" onclick="add('7')">7</button>
        <button class="key num" onclick="add('8')">8</button>
        <button class="key num" onclick="add('9')">9</button>
        <button class="key op" onclick="addOp('*')">×</button>

        <button class="key num" onclick="add('4')">4</button>
        <button class="key num" onclick="add('5')">5</button>
        <button class="key num" onclick="add('6')">6</button>
        <button class="key op" onclick="addOp('-')">−</button>

        <button class="key num" onclick="add('1')">1</button>
        <button class="key num" onclick="add('2')">2</button>
        <button class="key num" onclick="add('3')">3</button>
        <button class="key op" onclick="addOp('+')">+</button>

        <button class="key num zero" onclick="add('0')">0</button>
        <button class="key num" onclick="add('.')">,</button>
        <button class="key op" onclick="calculate()">=</button>
    </div>
</div>

<script>
    let current = '0';
    let buffer = '';

    function add(n) {
        current = (current === '0' && n !== '.') ? n : current + n;
        document.getElementById('display').textContent = current;
    }

    function addOp(o) {
        buffer += current + ' ' + o + ' ';
        current = '0';
    }

    function calculate() {
        try {
            let expr = buffer + current;
            let result = eval(expr.replace('×','*').replace('÷','/').replace('−','-'));
            
            // Add to history tray
            let tray = document.getElementById('history');
            tray.innerHTML += `<div>${expr} =</div>`;
            tray.scrollTop = tray.scrollHeight;

            current = String(Number(result.toFixed(8)));
            buffer = '';
            document.getElementById('display').textContent = current;
        } catch { document.getElementById('display').textContent = "Error"; }
    }

    function sci(type) {
        let n = parseFloat(current);
        if(type === 'Math.sin') current = Math.sin(n);
        if(type === 'Math.cos') current = Math.cos(n);
        if(type === 'Math.sqrt') current = Math.sqrt(n);
        if(type === 'pow') current = Math.pow(n, 2);
        current = String(Number(current.toFixed(6)));
        document.getElementById('display').textContent = current;
    }

    function reset() { current = '0'; buffer = ''; document.getElementById('display').textContent = '0'; document.getElementById('history').innerHTML = ''; }
    function del() { current = current.length > 1 ? current.slice(0, -1) : '0'; document.getElementById('display').textContent = current; }
</script>

</body>
</html>
