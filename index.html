<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora iOS</title>
    <style>
        :root {
            --ios-bg: #FFFFFF;
            --ios-num: #F2F2F7; /* Light Gray for numbers */
            --ios-top: #D1D1D6; /* Silver for top row */
            --ios-orange: #FF9F0A;
            --ios-text: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }

        body {
            background-color: #E5E5EA;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* HARD-LOCKED CONTAINER: Prevents stretching/squashing */
        .calculator {
            width: 360px;
            height: 760px;
            background-color: var(--ios-bg);
            border-radius: 45px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            border: 1px solid #D1D1D6;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .profile-img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--ios-top);
        }

        .brand {
            color: #8E8E93;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        /* SCROLLABLE HISTORY: Pro look */
        .history-pane {
            height: 50px;
            overflow-y: auto;
            text-align: right;
            padding: 0 10px;
            color: #8E8E93;
            font-size: 1.1rem;
            margin-top: auto;
        }

        .display {
            text-align: right;
            padding: 10px;
            color: var(--ios-text);
            font-size: 5.5rem;
            font-weight: 300;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 20px;
        }

        /* SCIENTIFIC BAR: Clean & Compact */
        .sci-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }

        .sci-btn {
            background: var(--ios-num);
            color: var(--ios-orange);
            border: none;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: 600;
        }

        /* THE GRID FIX: Precise 75px circles */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 75px);
            grid-template-rows: repeat(5, 75px);
            gap: 12px;
            justify-content: center;
        }

        button.key {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: brightness 0.1s;
        }

        button.key:active { filter: brightness(0.9); }

        .btn-num { background-color: var(--ios-num); color: var(--ios-text); }
        .btn-top { background-color: var(--ios-top); color: var(--ios-text); font-size: 1.6rem; }
        .btn-op { background-color: var(--ios-orange); color: white; font-size: 2.3rem; }

        /* Perfect Zero Pill Alignment */
        .zero {
            grid-column: span 2;
            width: 162px; /* 75+75+12 gap */
            border-radius: 50px;
            justify-content: flex-start;
            padding-left: 30px;
        }
    </style>
</head>
<body>

<div class="calculator">
    <div class="header">
        <img src="cprofile.png" alt="Profile" class="profile-img">
        <span class="brand">Cremildo Isaias</span>
    </div>

    <div class="history-pane" id="history"></div>
    <div class="display" id="res">0</div>

    <div class="sci-bar">
        <button class="sci-btn" onclick="sci('sin')">sin</button>
        <button class="sci-btn" onclick="sci('cos')">cos</button>
        <button class="sci-btn" onclick="sci('sqrt')">√</button>
        <button class="sci-btn" onclick="sci('sq')">x²</button>
    </div>

    <div class="grid">
        <button class="key btn-top" onclick="cls()">AC</button>
        <button class="key btn-top" onclick="del()">⌫</button>
        <button class="key btn-top" onclick="op('%')">%</button>
        <button class="key btn-op" onclick="op('/')">÷</button>

        <button class="key btn-num" onclick="num('7')">7</button>
        <button class="key btn-num" onclick="num('8')">8</button>
        <button class="key btn-num" onclick="num('9')">9</button>
        <button class="key btn-op" onclick="op('*')">×</button>

        <button class="key btn-num" onclick="num('4')">4</button>
        <button class="key btn-num" onclick="num('5')">5</button>
        <button class="key btn-num" onclick="num('6')">6</button>
        <button class="key btn-op" onclick="op('-')">−</button>

        <button class="key btn-num" onclick="num('1')">1</button>
        <button class="key btn-num" onclick="num('2')">2</button>
        <button class="key btn-num" onclick="num('3')">3</button>
        <button class="key btn-op" onclick="op('+')">+</button>

        <button class="key btn-num zero" onclick="num('0')">0</button>
        <button class="key btn-num" onclick="num('.')">,</button>
        <button class="key btn-op" onclick="calc()">=</button>
    </div>
</div>

<script>
    let cur = '0';
    let buf = '';
    const resDiv = document.getElementById('res');
    const histDiv = document.getElementById('history');

    function num(n) {
        if (cur === '0' && n !== '.') cur = n;
        else cur += n;
        resDiv.textContent = cur;
    }

    function op(s) {
        buf += cur + ' ' + s + ' ';
        histDiv.textContent = buf;
        cur = '0';
    }

    function calc() {
        try {
            let expr = buf + cur;
            let result = eval(expr.replace('×','*').replace('÷','/').replace('−','-'));
            histDiv.innerHTML = `<div>${expr} =</div>`;
            cur = String(Number(result.toFixed(8)));
            resDiv.textContent = cur;
            buf = '';
        } catch { resDiv.textContent = "Error"; }
    }

    function sci(t) {
        let n = parseFloat(cur);
        if(t === 'sin') cur = Math.sin(n);
        if(t === 'cos') cur = Math.cos(n);
        if(t === 'sqrt') cur = Math.sqrt(n);
        if(t === 'sq') cur = Math.pow(n, 2);
        cur = String(Number(parseFloat(cur).toFixed(6)));
        resDiv.textContent = cur;
    }

    function cls() { cur = '0'; buf = ''; resDiv.textContent = '0'; histDiv.textContent = ''; }
    function del() { cur = cur.length > 1 ? cur.slice(0, -1) : '0'; resDiv.textContent = cur; }
</script>

</body>
</html>
