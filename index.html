<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Original Pro Calculator</title>
    <style>
        :root {
            --bg: #000000; /* Apple's dark mode calculator base */
            --text: #ffffff;
            --orange: #ff9f0a;
            --gray: #a5a5a5;
            --dark-gray: #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: #1c1c1e;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 350px;
            background: var(--bg);
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }

        .display {
            text-align: right;
            padding: 40px 10px;
            color: white;
        }

        .result { font-size: 5rem; font-weight: 300; margin-bottom: 10px; }

        /* The "Secret" Scientific Drawer */
        .sci-drawer {
            display: none; /* Hidden by default */
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 12px;
            padding: 10px;
            background: #222;
            border-radius: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            aspect-ratio: 1;
            border-radius: 50%;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:active { opacity: 0.6; }

        /* Button Colors */
        .btn-num { background: var(--dark-gray); color: white; }
        .btn-op { background: var(--orange); color: white; font-size: 1.8rem; }
        .btn-top { background: var(--gray); color: black; }
        .btn-sci { background: #222; color: #ff9f0a; font-size: 0.9rem; border: 1px solid #444; }

        .zero { grid-column: span 2; aspect-ratio: auto; border-radius: 50px; justify-content: flex-start; padding-left: 30px; }

        /* Scientific Toggle Button */
        .sci-toggle {
            width: 100%;
            height: 40px;
            border-radius: 20px;
            background: #333;
            color: #888;
            margin-bottom: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
        }
        .active-sci { color: var(--orange); border: 1px solid var(--orange); }
    </style>
</head>
<body>

<div class="phone-container">
    <button class="sci-toggle" id="toggle" onclick="toggleScientific()">Scientific Functions</button>
    
    <div class="display">
        <div class="result" id="res">0</div>
    </div>

    <div class="sci-drawer" id="drawer">
        <button class="btn-sci" onclick="sci('Math.sin(')">sin</button>
        <button class="btn-sci" onclick="sci('Math.cos(')">cos</button>
        <button class="btn-sci" onclick="sci('Math.sqrt(')">√</button>
        <button class="btn-sci" onclick="sci('**2')">x²</button>
    </div>

    <div class="grid">
        <button class="btn-top" onclick="reset()">AC</button>
        <button class="btn-top" onclick="del()">⌫</button>
        <button class="btn-top" onclick="op('%')">%</button>
        <button class="btn-op" onclick="op('/')">÷</button>

        <button class="btn-num" onclick="num('7')">7</button>
        <button class="btn-num" onclick="num('8')">8</button>
        <button class="btn-num" onclick="num('9')">9</button>
        <button class="btn-op" onclick="op('*')">×</button>

        <button class="btn-num" onclick="num('4')">4</button>
        <button class="btn-num" onclick="num('5')">5</button>
        <button class="btn-num" onclick="num('6')">6</button>
        <button class="btn-op" onclick="op('-')">−</button>

        <button class="btn-num" onclick="num('1')">1</button>
        <button class="btn-num" onclick="num('2')">2</button>
        <button class="btn-num" onclick="num('3')">3</button>
        <button class="btn-op" onclick="op('+')">+</button>

        <button class="btn-num zero" onclick="num('0')">0</button>
        <button class="btn-num" onclick="num('.')">.</button>
        <button class="btn-op" onclick="calculate()">=</button>
    </div>
</div>

<script>
    let current = '0';
    let buffer = '';

    function toggleScientific() {
        const drawer = document.getElementById('drawer');
        const btn = document.getElementById('toggle');
        const isOpen = drawer.style.display === 'grid';
        drawer.style.display = isOpen ? 'none' : 'grid';
        btn.classList.toggle('active-sci');
    }

    function num(v) {
        current = (current === '0') ? v : current + v;
        document.getElementById('res').textContent = current;
    }

    function op(s) {
        buffer += current + s;
        current = '0';
    }

    function sci(f) {
        if(f === '**2') current += f;
        else current = f + current + ')';
        calculate();
    }

    function calculate() {
        try {
            let evalStr = (buffer + current).replace('×','*').replace('÷','/').replace('−','-');
            current = String(eval(evalStr));
            buffer = '';
            document.getElementById('res').textContent = current;
        } catch(e) { 
            document.getElementById('res').textContent = "Error";
            current = '0';
        }
    }

    function reset() { current = '0'; buffer = ''; document.getElementById('res').textContent = '0'; }
    function del() { current = current.slice(0, -1) || '0'; document.getElementById('res').textContent = current; }
</script>

</body>
</html>
