<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cremildo Isaias | Pro Calc</title>
    <style>
        :root {
            --bg: #000000;
            --btn-num: #333333;
            --btn-top: #a5a5a5;
            --accent: #ff9f0a;
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }

        body {
            background-color: #1c1c1e;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Fixed Width: Stops the horizontal stretching */
        .calculator {
            width: 350px; 
            background: var(--bg);
            border-radius: 40px;
            padding: 20px;
            border: 1px solid #333;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .logo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #444;
        }

        .brand { font-size: 0.65rem; color: #8e8e93; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }

        .display {
            text-align: right;
            padding: 20px 5px;
            color: white;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .result { font-size: 4.5rem; font-weight: 300; letter-spacing: -2px; line-height: 1; overflow: hidden; }

        .sci-toggle {
            width: 100%;
            padding: 10px;
            background: #222;
            color: var(--accent);
            border: none;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .sci-drawer {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }

        /* The Grid Fix: Fixed 72px columns */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 72px); 
            justify-content: center;
            gap: 12px;
        }

        button {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: none;
            font-size: 1.7rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: filter 0.2s;
        }

        button:active { filter: brightness(1.4); }

        .num { background: var(--btn-num); color: white; }
        .op { background: var(--accent); color: white; font-size: 2.2rem; }
        .top { background: var(--btn-top); color: black; }
        .sci { background: #222; color: var(--accent); font-size: 1rem; border-radius: 15px; }

        /* The Zero Fix: Exactly two buttons + one gap wide */
        .zero {
            grid-column: span 2;
            width: 156px; 
            border-radius: 40px;
            justify-content: flex-start;
            padding-left: 28px;
        }

        .history {
            margin-top: 20px;
            height: 80px;
            overflow-y: auto;
            border-top: 1px solid #222;
            padding: 10px 5px;
            color: #666;
            font-size: 0.85rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="calculator">
    <div class="header">
        <img src="cprofile.png" alt="Cremildo" class="logo">
        <span class="brand">Dev Precision</span>
    </div>

    <div class="display">
        <div class="result" id="res">0</div>
    </div>

    <button class="sci-toggle" onclick="toggleSci()">Scientific Tools</button>

    <div class="sci-drawer" id="drawer">
        <button class="sci" onclick="sci('Math.sin(')">sin</button>
        <button class="sci" onclick="sci('Math.cos(')">cos</button>
        <button class="sci" onclick="sci('Math.sqrt(')">√</button>
        <button class="sci" onclick="sci('**2')">x²</button>
    </div>

    <div class="grid">
        <button class="top" onclick="reset()">AC</button>
        <button class="top" onclick="del()">⌫</button>
        <button class="top" onclick="addOp('%')">%</button>
        <button class="op" onclick="addOp('/')">÷</button>

        <button class="num" onclick="add('7')">7</button>
        <button class="num" onclick="add('8')">8</button>
        <button class="num" onclick="add('9')">9</button>
        <button class="op" onclick="addOp('*')">×</button>

        <button class="num" onclick="add('4')">4</button>
        <button class="num" onclick="add('5')">5</button>
