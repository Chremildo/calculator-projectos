<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Scientific</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.6);
            --accent: #ff9f0a;
            --text: #1d1d1f;
            --btn-gray: rgba(0, 0, 0, 0.05);
            --shadow: 0 40px 80px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        /* Fixed Width Container for Stability */
        .calc-frame {
            width: 100%;
            max-width: 480px;
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 40px;
            border: 1.5px solid var(--glass-border);
            padding: 30px;
            box-shadow: var(--shadow);
        }

        .display {
            text-align: right;
            padding: 20px 10px 40px 10px;
        }

        .expr { font-size: 1rem; color: #86868b; min-height: 1.5em; letter-spacing: 0.5px; }
        .result { font-size: 4.5rem; font-weight: 300; color: var(--text); letter-spacing: -2px; }

        /* Grid uses auto-layout to avoid squashing */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        button {
            height: 60px; /* Uniform height for all buttons */
            border-radius: 18px; /* High-end rounded look instead of circles */
            border: none;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background: white;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); background: #fdfdfd; }
        button:active { transform: scale(0.95); filter: brightness(0.95); }

        /* Color States */
        button.op { background: var(--accent); color: white; font-size: 1.5rem; }
        button.sci { background: var(--btn-gray); color: #555; font-size: 0.9rem; }
        button.ac { color: #ff3b30; }

        /* Double-wide items */
        .span-2 { grid-column: span 2; }
    </style>
</head>
<body>

<div class="calc-frame">
    <div class="display">
        <div class="expr" id="expr"></div>
        <div class="result" id="result">0</div>
    </div>

    <div class="grid">
        <button class="sci" onclick="inputSci('Math.sin(')">sin</button>
        <button class="sci" onclick="inputSci('Math.cos(')">cos</button>
        <button class="sci" onclick="inputSci('Math.tan(')">tan</button>
        <button class="sci" onclick="inputSci('Math.log10(')">log</button>
        <button class="sci" onclick="inputNum('Math.PI')">π</button>

        <button class="sci" onclick="inputSci('Math.sqrt(')">√</button>
        <button class="sci" onclick="inputSci('**2')">x²</button>
        <button class="sci" onclick="inputNum('(')">(</button>
