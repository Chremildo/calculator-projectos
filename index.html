<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Style Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f2f2f7;
            --glass: rgba(255, 255, 255, 0.85);
            --text: #1c1c1e;
            --accent: #ff9f0a;
            --btn-gray: rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .phone-frame {
            width: 100%;
            max-width: 375px; /* Actual iPhone width */
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.5);
            padding: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .display {
            text-align: right;
            padding: 40px 10px 20px 10px;
        }

        .expr { font-size: 1rem; color: #8e8e93; min-height: 1.2em; margin-bottom: 5px; }
        .result { font-size: 4rem; font-weight: 300; color: var(--text); letter-spacing: -2px; }

        /* Scientific Panel (Hidden by default) */
        .sci-panel {
            display: none; /* Toggle this with JS */
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 12px;
            padding: 15px;
            background: rgba(0,0,0,0.03);
            border-radius: 20px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            aspect-ratio: 1;
            border-radius: 50%;
            border: none;
            font-size: 1.4rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:active { transform: scale(0.9); filter: brightness(0.9); }

        /* Scientific Toggle Style */
        .mode-toggle {
            width: 100%;
            aspect-ratio: auto;
            height: 40px;
            border-radius: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--btn-gray);
            margin-bottom: 20px;
            color: #8e8e93;
        }

        .mode-toggle.active { background: var(--accent); color: white; }

        button.op { background: var(--accent); color: white; }
        button.gray { background: var(--btn-gray); }
        button.sci-btn { font-size: 1rem; background: #e5e5ea; }
        .zero { grid-column: span 2; aspect-ratio: auto; border-radius: 40px; justify-content: flex-start; padding-left: 25px; }
    </style>
</head>
<body>

<div class="phone-frame">
    <button class="mode-toggle" id="toggleBtn" onclick="toggleSci()">Scientific Mode</button>

    <div class="display">
        <div class="expr" id="expr"></div>
        <div class="result" id="result">0</div>
    </div>

    <div class="sci-panel" id="sciPanel">
        <button class="sci-btn" onclick="inputSci('Math.sin(')">sin</button>
        <button class="sci-btn" onclick="inputSci('Math.cos(')">cos</button>
        <button class="sci-btn" onclick="inputSci('Math.tan(')">tan</button>
        <button class="sci-btn" onclick="inputSci('Math.sqrt(')">√</button>
        <button class="sci-btn" onclick="inputSci('**2')">x²</button>
        <button class="sci-btn" onclick="inputNum('(')">(</button>
        <button class="sci-btn" onclick="inputNum(')')">)</button>
        <button class="sci-btn" onclick="inputNum('Math.PI')">π</button>
    </div>

    <div class="grid">
        <button class="gray" onclick="clearAll()">AC</button>
        <button class="gray" onclick="clearLast()">⌫</button>
        <button class="gray" onclick="inputOp('%')">%</button>
        <button class="op" onclick="inputOp('/')">÷</button>

        <button onclick="inputNum('7')">7</button>
        <button onclick="inputNum('8')">8</button>
        <button onclick="inputNum('9')">9</button>
        <button class="op" onclick="inputOp('*')">×</button>

        <button onclick="inputNum('4')">4</button>
        <button onclick="inputNum('5')">5</button>
        <button onclick="inputNum('6')">6</button>
        <button class="op" onclick="inputOp('-')">−</button>

        <button onclick="inputNum('1')">1</button>
        <button onclick="inputNum('2')">2</button>
        <button onclick="inputNum('3')">3</button>
        <button class="op" onclick="inputOp('+')">+</button>

        <button class="zero" onclick="inputNum('0')">0</button>
        <button onclick="inputDot()">.</button>
        <button class="op" onclick="calculate()">=</button>
    </div>
</div>

<script>
    let current = '0';
    let fullExpr = '';
    let isSci = false;

    function toggleSci() {
        const panel = document.getElementById('sciPanel');
        const btn = document.getElementById('toggleBtn');
        isSci = !isSci;
        panel.style.display = isSci ? 'grid' : 'none';
        btn.classList.toggle('active');
        btn.textContent = isSci ? 'Standard Mode' : 'Scientific Mode';
    }

    function update() {
        document.getElementById('result').textContent = current.replace('Math.PI', 'π');
        document.getElementById('expr').textContent = fullExpr.replace(/Math\./g, '');
    }

    function inputNum(n) {
        current = (current === '0') ? n : current + n;
        update();
    }

    function inputSci(f) {
        if(f === '**2') current += f;
        else current = f + current + ')';
        update();
    }

    function inputOp(o) {
        fullExpr += current + ' ' + o + ' ';
        current = '0';
        update();
    }

    function calculate() {
        try {
            let res = eval((fullExpr + current).replace('×','*').replace('÷','/').replace('−','-'));
            current = String(parseFloat(res.toFixed(6)));
            fullExpr = '';
            update();
        } catch(e) { current = 'Error'; update(); }
    }

    function clearAll() { current = '0'; fullExpr = ''; update(); }
    function clearLast() { current = current.length > 1 ? current.slice(0,-1) : '0'; update(); }
    function inputDot() { if(!current.includes('.')) current += '.'; update(); }
</script>

</body>
</html>
