<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora iPhone Pro</title>
    <style>
        :root {
            --ios-bg: #FFFFFF;
            --ios-num: #F2F2F7; /* Apple light gray num background */
            --ios-top: #D1D1D6; /* Apple silver top background */
            --ios-orange: #FF9F0A;
            --ios-text: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }

        body {
            background-color: #E5E5EA;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Fixed iPhone Pro Shape - Prevents any squashing */
        .iphone-frame {
            width: 375px;
            height: 812px;
            background-color: var(--ios-bg);
            border-radius: 50px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            border: 1px solid #D1D1D6;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .profile-pic {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--ios-top);
        }

        .brand { color: #8E8E93; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }

        /* REAL HISTORY LOG - Scrolling area */
        .history-log {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            text-align: right;
            padding: 10px;
            overflow-y: auto;
            color: #8E8E93;
            font-size: 1.2rem;
            min-height: 80px;
        }

        .display {
            text-align: right;
            padding: 10px;
            color: var(--ios-text);
            font-size: 5.8rem;
            font-weight: 300;
            letter-spacing: -3px;
            line-height: 1;
            margin-bottom: 25px;
        }

        /* Fixed 80px circles for the true Apple look */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(5, 80px);
            gap: 12px;
            justify-content: center;
        }

        button.key {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            font-size: 2.2rem;
            font-weight: 400;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        button.key:active { opacity: 0.6; }

        .num { background-color: var(--ios-num); color: black; }
        .top { background-color: var(--ios-top); color: black; font-size: 1.8rem; }
        .op  { background-color: var(--ios-orange); color: white; font-size: 2.5rem; }

        /* The Pill Shape Zero + The Decimal Button */
        .zero {
            grid-column: span 2;
            width: 172px; /* 80 + 80 + 12 gap */
            border-radius: 50px;
            justify-content: flex-start;
            padding-left: 32px;
        }
    </style>
</head>
<body>

<div class="iphone-frame">
    <div class="header">
        <img src="cprofile.png" alt="Kevin" class="profile-pic">
        <span class="brand">Cremildo Isaias</span>
    </div>

    <div class="history-log" id="history"></div>
    <div class="display" id="display">0</div>

    <div class="grid">
        <button class="key top" onclick="cls()">AC</button>
        <button class="key top" onclick="del()">⌫</button>
        <button class="key top" onclick="addOp('%')">%</button>
        <button class="key op" onclick="addOp('/')">÷</button>

        <button class="key num" onclick="add('7')">7</button>
        <button class="key num" onclick="add('8')">8</button>
        <button class="key num" onclick="add('9')">9</button>
        <button class="key op" onclick="addOp('*')">×</button>

        <button class="key num" onclick="add('4')">4</button>
        <button class="key num" onclick="add('5')">5</button>
        <button class="key num" onclick="add('6')">6</button>
        <button class="key op" onclick="addOp('-')">−</button>

        <button class="key num" onclick="add('1')">1</button>
        <button class="key num" onclick="add('2')">2</button>
        <button class="key num" onclick="add('3')">3</button>
        <button class="key op" onclick="addOp('+')">+</button>

        <button class="key num zero" onclick="add('0')">0</button>
        <button class="key num" onclick="add('.')">,</button>
        <button class="key op" onclick="calculate()">=</button>
    </div>
</div>

<script>
    let current = '0';
    let buffer = '';

    function add(n) {
        current = (current === '0' && n !== '.') ? n : current + n;
        document.getElementById('display').textContent = current;
    }

    function addOp(o) {
        buffer += current + ' ' + o + ' ';
        current = '0';
    }

    function calculate() {
        try {
            let expr = (buffer + current).replace('×','*').replace('÷','/').replace('−','-');
            let res = eval(expr);
            
            // Add to history tray
            let hist = document.getElementById('history');
            hist.innerHTML += `<div>${buffer}${current} =</div>`;
            hist.scrollTop = hist.scrollHeight;

            current = String(Number(res.toFixed(8)));
            buffer = '';
            document.getElementById('display').textContent = current;
        } catch { document.getElementById('display').textContent = "Error"; }
    }

    function cls() { current = '0'; buffer = ''; document.getElementById('display').textContent = '0'; document.getElementById('history').innerHTML = ''; }
    function del() { current = current.length > 1 ? current.slice(0, -1) : '0'; document.getElementById('display').textContent = current; }
</script>

</body>
</html>
