<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Pro</title>
    <style>
        :root {
            --ios-bg: #FFFFFF;
            --ios-num: #F2F2F7;
            --ios-top: #D1D1D6;
            --ios-orange: #FF9F0A;
            --ios-text: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }

        body {
            background-color: #E5E5EA;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* FLEXIBLE CONTAINER: No fixed height so nothing gets cut off */
        .calculator {
            width: 375px;
            background-color: var(--ios-bg);
            border-radius: 50px;
            padding: 20px 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            border: 1px solid #D1D1D6;
        }

        /* Top Bar with 3 Dots */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            padding-bottom: 10px;
        }

        .dots {
            color: var(--ios-orange);
            font-size: 1.8rem;
            letter-spacing: 2px;
            cursor: pointer;
            line-height: 0.5;
        }

        /* History: Stays visible above the result */
        .history-tape {
            text-align: right;
            color: #8E8E93;
            font-size: 1.2rem;
            min-height: 40px;
            margin-bottom: 5px;
            overflow: hidden;
        }

        .display {
            text-align: right;
            color: var(--ios-text);
            font-size: 5.5rem;
            font-weight: 300;
            letter-spacing: -3px;
            line-height: 1;
            margin-bottom: 20px;
            word-wrap: break-word;
        }

        /* Scientific Row: Compact but Visible */
        .sci-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .sci-btn {
            background: var(--ios-num);
            color: var(--ios-orange);
            border: none;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* Grid: Precision Circles */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 75px);
            grid-template-rows: repeat(5, 75px);
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button.key {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.1s;
        }

        button.key:active { opacity: 0.5; }
        .btn-n { background: var(--ios-num); color: black; }
        .btn-t { background: var(--ios-top); color: black; font-size: 1.6rem; }
        .btn-o { background: var(--ios-orange); color: white; font-size: 2.4rem; }

        .zero {
            grid-column: span 2;
            width: 162px;
            border-radius: 50px;
            justify-content: flex-start;
            padding-left: 28px;
        }

        /* Bottom Nav with Toggle */
        .bottom-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid #F2F2F7;
        }

        .nav-icon { color: var(--ios-orange); font-size: 1.5rem; cursor: pointer; }
        .nav-label { color: #8E8E93; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="calculator">
    <div class="top-bar">
        <div class="dots">...</div>
    </div>

    <div class="history-tape" id="hist"></div>
    <div class="display" id="res">0</div>

    <div class="sci-bar">
        <button class="sci-btn" onclick="sci('sin')">sin</button>
        <button class="sci-btn" onclick="sci('cos')">cos</button>
        <button class="sci-btn" onclick="sci('sqrt')">√</button>
        <button class="sci-btn" onclick="sci('sq')">x²</button>
    </div>

    <div class="grid">
        <button class="key btn-t" onclick="cls()">AC</button>
        <button class="key btn-t" onclick="toggle()">+/-</button>
        <button class="key btn-t" onclick="pct()">%</button>
        <button class="key btn-o" onclick="op('/')">÷</button>

        <button class="key btn-n" onclick="num('7')">7</button>
        <button class="key btn-n" onclick="num('8')">8</button>
        <button class="key btn-n" onclick="num('9')">9</button>
        <button class="key btn-o" onclick="op('*')">×</button>

        <button class="key btn-n" onclick="num('4')">4</button>
        <button class="key btn-n" onclick="num('5')">5</button>
        <button class="key btn-n" onclick="num('6')">6</button>
        <button class="key btn-o" onclick="op('-')">−</button>

        <button class="key btn-n" onclick="num('1')">1</button>
        <button class="key btn-n" onclick="num('2')">2</button>
        <button class="key btn-n" onclick="num('3')">3</button>
        <button class="key btn-o" onclick="op('+')">+</button>

        <button class="key btn-n zero" onclick="num('0')">0</button>
        <button class="key btn-n" onclick="num('.')">,</button>
        <button class="key btn-o" onclick="calc()">=</button>
    </div>

    <div class="bottom-nav">
        <span class="nav-icon">▤</span>
        <span class="nav-label">Cremildo Isaias</span>
        <span class="nav-icon">🕒</span>
    </div>
</div>

<script>
    let cur = '0';
    let buf = '';
    const d = document.getElementById('res');
    const h = document.getElementById('hist');

    function num(n) {
        if (cur === '0' && n !== '.') cur = n;
        else cur += n;
        d.textContent = cur;
    }

    function op(s) {
        buf += cur + ' ' + s + ' ';
        h.textContent = buf;
        cur = '0';
    }

    function calc() {
        try {
            let expr = buf + cur;
            let result = eval(expr.replace('×','*').replace('÷','/').replace('−','-'));
            h.innerHTML = `<div>${expr} =</div>`;
            cur = String(Number(result.toFixed(8)));
            d.textContent = cur;
            buf = '';
        } catch { d.textContent = "Error"; }
    }

    function sci(t) {
        let n = parseFloat(cur);
        if(t === 'sin') cur = Math.sin(n);
        if(t === 'cos') cur = Math.cos(n);
        if(t === 'sqrt') cur = Math.sqrt(n);
        if(t === 'sq') cur = Math.pow(n, 2);
        cur = String(Number(parseFloat(cur).toFixed(6)));
        d.textContent = cur;
    }

    function toggle() { cur = String(parseFloat(cur) * -1); d.textContent = cur; }
    function pct() { cur = String(parseFloat(cur) / 100); d.textContent = cur; }
    function cls() { cur = '0'; buf = ''; d.textContent = '0'; h.textContent = ''; }
</script>

</body>
</html>
