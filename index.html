<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora iPhone</title>
    <style>
        :root {
            --ios-bg: #FFFFFF;
            --ios-num: #F2F2F7;
            --ios-top: #D1D1D6;
            --ios-orange: #FF9F0A;
            --ios-text: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }

        body {
            background-color: #E5E5EA;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Fixed iPhone Frame */
        .calculator {
            width: 375px;
            height: 812px;
            background-color: var(--ios-bg);
            border-radius: 50px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            border: 1px solid #D1D1D6;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .profile-pic {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #D1D1D6;
        }

        /* History Tape - Small gray text above current total */
        .history-tape {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            text-align: right;
            padding: 10px;
            color: #8E8E93;
            font-size: 1.4rem;
            min-height: 60px;
        }

        .display {
            text-align: right;
            padding: 0 10px 20px 10px;
            color: var(--ios-text);
            font-size: 6rem;
            font-weight: 300;
            letter-spacing: -3px;
            line-height: 0.9;
        }

        /* KEYPAD GRID: Precise Apple spacing */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(5, 80px);
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            font-size: 2.2rem;
            font-weight: 400;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.15s;
        }

        button:active { opacity: 0.5; }

        .btn-num { background-color: var(--ios-num); color: black; }
        .btn-top { background-color: var(--ios-top); color: black; font-size: 1.8rem; }
        .btn-op  { background-color: var(--ios-orange); color: white; font-size: 2.6rem; }

        /* The Zero Pill */
        .zero {
            grid-column: span 2;
            width: 172px; /* 80+80+12 */
            border-radius: 50px;
            justify-content: flex-start;
            padding-left: 32px;
        }
    </style>
</head>
<body>

<div class="calculator">
    <div class="header">
        <img src="cprofile.png" alt="Kevin" class="profile-pic">
    </div>

    <div class="history-tape" id="hist"></div>
    <div class="display" id="res">0</div>

    <div class="grid">
        <button class="btn-top" onclick="cls()">AC</button>
        <button class="btn-top" onclick="toggle()">+/-</button>
        <button class="btn-top" onclick="pct()">%</button>
        <button class="btn-op" onclick="op('/')">÷</button>

        <button class="btn-num" onclick="num('7')">7</button>
        <button class="btn-num" onclick="num('8')">8</button>
        <button class="btn-num" onclick="num('9')">9</button>
        <button class="btn-op" onclick="op('*')">×</button>

        <button class="btn-num" onclick="num('4')">4</button>
        <button class="btn-num" onclick="num('5')">5</button>
        <button class="btn-num" onclick="num('6')">6</button>
        <button class="btn-op" onclick="op('-')">−</button>

        <button class="btn-num" onclick="num('1')">1</button>
        <button class="btn-num" onclick="num('2')">2</button>
        <button class="btn-num" onclick="num('3')">3</button>
        <button class="btn-op" onclick="op('+')">+</button>

        <button class="btn-num zero" onclick="num('0')">0</button>
        <button class="btn-num" onclick="num('.')">,</button>
        <button class="btn-op" onclick="calc()">=</button>
    </div>
</div>

<script>
    let cur = '0';
    let buf = '';
    const d = document.getElementById('res');
    const h = document.getElementById('hist');

    function num(n) {
        if (cur === '0' && n !== '.') cur = n;
        else cur += n;
        d.textContent = cur;
    }

    function op(s) {
        buf += cur + ' ' + s + ' ';
        h.textContent = buf;
        cur = '0';
    }

    function calc() {
        try {
            let expr = buf + cur;
            let result = eval(expr.replace('×','*').replace('÷','/').replace('−','-'));
            h.innerHTML = `<div>${expr} =</div>`;
            cur = String(Number(result.toFixed(8)));
            d.textContent = cur;
            buf = '';
        } catch { d.textContent = "Error"; }
    }

    function toggle() { 
        cur = String(parseFloat(cur) * -1); 
        d.textContent = cur; 
    }

    function pct() { 
        cur = String(parseFloat(cur) / 100); 
        d.textContent = cur; 
    }

    function cls() { cur = '0'; buf = ''; d.textContent = '0'; h.textContent = ''; }
</script>

</body>
</html>
